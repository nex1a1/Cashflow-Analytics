version: '3.8'

services:
  # 1. Backend (Node.js API + SQLite)
  backend:
    image: node:20-alpine
    container_name: expense_api
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules   # แคชแพ็กเกจ
      - sqlite_data:/app/data                    # persist ไฟล์ SQLite
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/cashflow.db
    command: sh -c "npm install --no-audit --no-fund && npm start"

  # 2. Frontend (React + Vite)
  frontend:
    image: node:20-alpine
    container_name: expense_web
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # แคชแพ็กเกจ
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host"

volumes:
  sqlite_data: 
  backend_node_modules:
  frontend_node_modules: